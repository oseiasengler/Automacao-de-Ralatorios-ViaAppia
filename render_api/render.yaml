version: "1"
services:
- type: web
  name: artesp-geojson-api
  runtime: docker
  # Repositório do projeto (Automacao-de-Ralatorios-ViaAppia)
  repo: https://github.com/gestao-rodovias/Automacao-de-Ralatorios-ViaAppia
  plan: standard
  envVars:
  - key: ARTESP_JWT_SECRET
    sync: false
  - key: ARTESP_WEB_USERS
    sync: false
  - key: ARTESP_WEB_PBKDF2_ITERATIONS
    sync: false
  - key: ARTESP_PFX_PASSWORD
    sync: false
  - key: ARTESP_PFX_CONTENT
    sync: false
  - key: ARTESP_CORS_ORIGINS
    sync: false
  region: ohio
  dockerContext: .
  dockerfilePath: ./Dockerfile
  autoDeployTrigger: commit
